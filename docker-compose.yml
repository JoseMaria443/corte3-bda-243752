services:
  db:
    image: postgres:16-alpine
    container_name: clinica_vet_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: clinica_vet
      POSTGRES_USER: api_backend
      POSTGRES_PASSWORD: api_backend_pwd
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./bd/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - vet_net

  cache:
    image: redis:7-alpine
    container_name: clinica_vet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vet_net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: clinica_vet_api
    restart: unless-stopped
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://api_backend:api_backend_pwd@db:5432/clinica_vet
      REDIS_URL: redis://cache:6379
      CACHE_TTL_SECONDS: 600
    depends_on:
      - db
      - cache
    ports:
      - "8080:8080"
    networks:
      - vet_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clinica_vet_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3002:80"
    networks:
      - vet_net

volumes:
  postgres_data:
  redis_data:

networks:
  vet_net:
    driver: bridge
